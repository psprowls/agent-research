#   - qwen.qwen3-32b-v1:0                                (cost=N/A, quality=0.778)          -- fallback never fired
# Decision: KEEP haiku-4-5 (only candidate with non-zero fallback coverage; re-sweep
# once code-reader cases reliably trigger the fallback across all candidates)
# Previous default: us.anthropic.claude-haiku-4-5-20251001-v1:0
