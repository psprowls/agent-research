# Dedicated handle for the BED-01 connectivity ping in eval_harness.preflight.
# Pin a cheap, fast model here — this role is invoked once per sweep purely to
# confirm AWS credentials and bedrock:InvokeModel permission before spending.
# Candidate set refreshed 2026-05-30 (post-Haiku-purge, /gsd-explore session);
# Haiku removed for quota exhaustion; qwen3-32b is the new cheap/fast ping model.
[roles.preflight]
model_id        = "qwen.qwen3-32b-v1:0"
region          = "us-east-1"
max_tokens      = 64
max_concurrency = 1

[roles.librarian]
# Candidate set refreshed 2026-05-30 (post-Haiku-purge, /gsd-explore session);
# Haiku removed for quota exhaustion; per-role defaults chosen in that session.
model_id        = "moonshotai.kimi-k2.5"
region          = "us-east-1"
max_tokens      = 2048
max_concurrency = 5
sweep_candidates = [
  "qwen.qwen3-32b-v1:0",
  "qwen.qwen3-next-80b-a3b",
  "deepseek.v3.2",
  "moonshotai.kimi-k2.5",
  "zai.glm-5",
]

[roles.code_reader]
# Candidate set refreshed 2026-05-30 (post-Haiku-purge, /gsd-explore session);
# Haiku removed for quota exhaustion; per-role defaults chosen in that session.
# Plan 03-09: vault-thin code-fallback role. Reads source files directly when
# the librarian fan-out returns no useful excerpts. Conservative defaults —
# the fallback is opt-in and bounded (max 5 tool-call iterations per page).
model_id        = "minimax.minimax-m2.5"
region          = "us-east-1"
max_tokens      = 2048
max_concurrency = 3
sweep_candidates = [
  "qwen.qwen3-coder-30b-a3b-v1:0",
  "qwen.qwen3-coder-next",
  "mistral.devstral-2-123b",
  "openai.gpt-oss-120b-1:0",
  "minimax.minimax-m2.5",
]

[roles.scanner]
# Candidate set refreshed 2026-05-30 (post-Haiku-purge, /gsd-explore session);
# Haiku removed for quota exhaustion; per-role defaults chosen in that session.
model_id        = "openai.gpt-oss-20b-1:0"
region          = "us-east-1"
max_tokens      = 500
max_concurrency = 10
sweep_candidates = [
  "openai.gpt-oss-20b-1:0",
  "zai.glm-4.7-flash",
  "mistral.ministral-3-14b-instruct",
  "qwen.qwen3-32b-v1:0",
  "qwen.qwen3-coder-30b-a3b-v1:0",
]

