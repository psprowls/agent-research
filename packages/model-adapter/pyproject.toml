[project]
name = "model-adapter"
version = "0.1.0"
description = "AWS Bedrock model loader for graph-wiki-agent"
requires-python = ">=3.11"
dependencies = [
    "langchain-aws>=1.4.6",
    "boto3>=1.38",
]

[build-system]
requires = ["uv_build>=0.11.14,<0.12"]
build-backend = "uv_build"

[tool.uv.build.include]
include = ["src/model_adapter/models.toml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--import-mode=importlib"
# Mirror the workspace-root convention (CLAUDE.md §8): this local config
# overrides the root when pytest's rootdir resolves to this package, so the
# async-mode setting must be repeated here for `async def test_*` collection.
asyncio_mode = "auto"
