[project]
name = "source-parser"
version = "0.1.0"
description = "Tree-sitter-backed Python package that turns source files into a span-bearing SourceTree, with a graph projection aligned to lattice-graph."
authors = [
  { name = "Patrick Sprowls", email = "psprowls@gmail.com" },
]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "tree-sitter>=0.23.0",
  "tree-sitter-language-pack>=0.8.0,<=1.6.2",
]

[project.optional-dependencies]
test = ["pytest>=8.0"]

[build-system]
requires = ["uv_build>=0.11.14,<0.12"]
build-backend = "uv_build"

[tool.hatch.build.targets.wheel]
packages = ["src/source_parser"]

[tool.hatch.build.targets.sdist]
include = ["src", "tests", "fixtures", "README.md", "CLAUDE.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
