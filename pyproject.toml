[tool.uv.workspace]
members = ["packages/*", "agents/*"]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio==1.3.0",
    "ruff>=0.15",
    "pre-commit",
    "syrupy==5.1.0",
]

[tool.ruff]
line-length = 120
exclude = ["**/fixtures/**"]
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
pythonpath = ["packages/eval-harness/tests"]
asyncio_mode = "auto"
markers = [
    "integration: requires real Bedrock or subprocess (skipped by default)",
    "eval: opt-in eval suite (skipped unless GRAPH_WIKI_RUN_EVAL=1)",
]
