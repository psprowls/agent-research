[tool.uv.workspace]
members = ["cores/*", "agents/*"]
exclude = ["cores/prompt-sources"]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio==1.3.0",
    "ruff>=0.15",
    "pre-commit",
    "syrupy==5.1.0",
]

[tool.ruff]
line-length = 120
exclude = ["**/fixtures/**"]
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
